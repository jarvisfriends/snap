name: Auto-release

# Turns a merge to the default branch into a release decision using gorelease's
# API-compatibility analysis (the logic lives in tools/releasetag, not in shell):
#
#   • On a pull request it posts a comment describing what will happen on merge.
#   • On merge, a backward-compatible change is auto-tagged as a patch. A minor
#     or major bump is never auto-tagged — it is surfaced (with the reason) for a
#     maintainer to approve by pushing the tag.
#
# snap is a library, so the tag itself is the release; there is no goreleaser.

on:
  pull_request:
    branches: [ "main", "master" ]
  push:
    branches: [ "main", "master" ]

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # PR preview — comments the plan, never tags.
  plan:
    name: Release plan (PR preview)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write # post the "what will happen on merge" comment
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # gorelease needs full history + tags
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
      - name: Install gorelease
        # @latest mirrors tools/local_verify.sh.
        run: go install golang.org/x/exp/cmd/gorelease@latest
      - name: Plan release
        run: |
          go build -C tools/releasetag -o "$RUNNER_TEMP/releasetag" .
          "$RUNNER_TEMP/releasetag" -mode plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Merge — require CI to pass, then auto-tag a patch (or surface minor/major).
  ci:
    name: CI
    if: github.event_name == 'push'
    uses: ./.github/workflows/ci.yml

  tag:
    name: Auto-tag patch
    if: github.event_name == 'push'
    needs: [ci]
    runs-on: ubuntu-24.04
    permissions:
      contents: write # push the tag
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # RELEASE_PAT allows tag-push-triggered workflows to run. Without it,
          # tags created with GITHUB_TOKEN do not trigger downstream workflows.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
      - name: Install gorelease
        run: go install golang.org/x/exp/cmd/gorelease@latest
      - name: Apply release
        run: |
          go build -C tools/releasetag -o "$RUNNER_TEMP/releasetag" .
          "$RUNNER_TEMP/releasetag" -mode apply
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
