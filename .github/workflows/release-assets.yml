name: Release assets

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  render-and-upload:
    name: Render tapes and upload GIFs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: Render all tapes
        run: go -C tools/rendertapes run .

      - name: Upload GIF assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mapfile -t gifs < <(find examples -type f -name 'demo.gif' | sort)
          if [[ ${#gifs[@]} -eq 0 ]]; then
            echo "No demo gifs found to upload"
            exit 1
          fi
          gh release upload "$tag" "${gifs[@]}" --clobber